<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#b5451b" />
  <link rel="manifest" href="/manifest.json" />
  <title>साथी AI — आपका अपना सहायक</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --saffron: #b5451b;
      --saffron-md: #e05a22;
      --green: #1e6b3c;
      --green-lt: #d5f5e3;
      --gold: #d4a017;
      --gray-bg: #fdf6f0;
      --gray-line: #e8d5c4;
      --text: #2c1810;
      --text-soft: #7d5a4f;
      --white: #ffffff;
      --red: #c0392b;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hind', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: var(--saffron);
      color: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-circle {
      width: 54px; height: 54px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
      border: 2px solid var(--gold);
    }
    .header-text h1 { font-size: 26px; font-weight: 600; line-height: 1.2; }
    .header-text p { font-size: 14px; opacity: 0.88; margin-top: 2px; }
    .status-dot {
      width: 12px; height: 12px;
      background: #2ecc71;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #chat-box {
      flex: 1; overflow-y: auto;
      padding: 22px 18px;
      display: flex; flex-direction: column;
      gap: 18px; scroll-behavior: smooth;
    }
    .bubble-wrap {
      display: flex; flex-direction: column;
      max-width: 84%;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .bubble-wrap.user      { align-self: flex-end;   align-items: flex-end; }
    .bubble-wrap.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 16px 20px;
      border-radius: var(--radius);
      font-size: 20px; line-height: 1.75;
    }
    .bubble-wrap.user .bubble {
      background: var(--saffron); color: var(--white);
      border-bottom-right-radius: 4px;
    }
    .bubble-wrap.assistant .bubble {
      background: var(--white); color: var(--text);
      border: 1.5px solid var(--gray-line);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .bubble-label {
      font-size: 13px; color: var(--text-soft);
      margin-bottom: 5px; padding: 0 4px; font-weight: 600;
    }
    .typing-bubble {
      background: var(--white);
      border: 1.5px solid var(--gray-line);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 18px 22px;
      display: flex; gap: 7px; align-items: center;
      box-shadow: var(--shadow);
    }
    .dot {
      width: 10px; height: 10px;
      background: var(--saffron-md);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-8px); }
    }
    .quick-replies {
      display: flex; flex-wrap: wrap;
      gap: 10px; padding: 0 18px 10px; flex-shrink: 0;
    }
    .quick-btn {
      padding: 10px 16px; border-radius: 24px;
      border: 2px solid var(--saffron-md);
      background: var(--white); color: var(--saffron);
      font-size: 17px; font-family: 'Hind', sans-serif;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .quick-btn:hover { background: var(--saffron); color: var(--white); }
    #input-area {
      background: var(--white);
      border-top: 2px solid var(--gray-line);
      padding: 14px 18px; flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #user-input {
      flex: 1; padding: 14px 16px;
      border-radius: var(--radius);
      border: 2px solid var(--gray-line);
      background: var(--gray-bg); color: var(--text);
      font-size: 20px; font-family: 'Hind', sans-serif;
      line-height: 1.5; resize: none;
      min-height: 56px; max-height: 140px;
      outline: none; transition: border 0.15s;
    }
    #user-input:focus { border-color: var(--saffron-md); background: var(--white); }
    #user-input::placeholder { color: var(--text-soft); }
    .icon-btn {
      width: 56px; height: 56px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0; transition: all 0.15s;
    }
    #send-btn { background: var(--saffron); color: var(--white); box-shadow: var(--shadow); }
    #send-btn:hover { background: var(--saffron-md); transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #voice-btn { background: var(--green-lt); color: var(--green); border: 2px solid var(--green); }
    #voice-btn:hover { background: var(--green); color: var(--white); }
    #voice-btn.recording {
      background: var(--red); color: var(--white);
      border-color: var(--red); animation: recordPulse 1s infinite;
    }
    @keyframes recordPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
      50%      { box-shadow: 0 0 0 10px rgba(192,57,43,0); }
    }
    .input-hint { font-size: 13px; color: var(--text-soft); margin-top: 8px; text-align: center; }
    #sos-btn {
      position: fixed; bottom: 110px; right: 18px;
      background: var(--red); color: var(--white);
      border: none; border-radius: 50px;
      padding: 12px 18px; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 16px rgba(192,57,43,0.35);
      font-family: 'Hind', sans-serif; z-index: 100; transition: all 0.15s;
    }
    #sos-btn:hover { transform: scale(1.05); }
    .welcome-card {
      background: var(--white);
      border: 1.5px solid var(--gray-line);
      border-top: 4px solid var(--gold);
      border-radius: var(--radius);
      padding: 22px; text-align: center;
      box-shadow: var(--shadow);
    }
    .welcome-card h2 { font-size: 24px; color: var(--saffron); margin-bottom: 10px; font-weight: 600; }
    .welcome-card p { font-size: 19px; color: var(--text-soft); line-height: 1.7; }
    .reminder-badge {
      background: var(--gold); color: #6b3e00;
      border-radius: 8px; padding: 5px 12px;
      font-size: 13px; font-weight: 600;
      margin-top: 6px; display: inline-block;
    }
    .error-bubble {
      background: #fdedec; border: 1.5px solid #e74c3c;
      border-radius: var(--radius); padding: 14px 18px;
      font-size: 18px; color: var(--red);
    }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--gray-line); border-radius: 3px; }
    @media (max-width: 480px) {
      .bubble { font-size: 18px; }
      #user-input { font-size: 18px; }
      header { padding: 12px 14px; }
      .header-text h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-circle">🙏</div>
    <div class="header-text">
      <h1>साथी AI</h1>
      <p>आपका अपना डिजिटल सहायक — हमेशा साथ</p>
    </div>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat-box"></div>

<div class="quick-replies" id="quick-replies">
  <button class="quick-btn" onclick="sendQuick('नमस्ते! आप कैसे हैं?')">🙏 नमस्ते</button>
  <button class="quick-btn" onclick="sendQuick('आज का स्वास्थ्य सुझाव दीजिए')">💊 स्वास्थ्य टिप</button>
  <button class="quick-btn" onclick="sendQuick('मुझे कल सुबह 8 बजे दवाई याद दिलाएं')">⏰ रिमाइंडर</button>
  <button class="quick-btn" onclick="sendQuick('आप मेरी क्या मदद कर सकते हैं?')">❓ मदद</button>
</div>

<div id="input-area">
  <div class="input-row">
    <button id="voice-btn" class="icon-btn" onclick="toggleVoice()" title="बोलकर पूछें">🎤</button>
    <textarea id="user-input"
      placeholder="यहाँ अपनी बात लिखें... (Hindi या English में)"
      rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" class="icon-btn" onclick="sendMessage()" title="भेजें">➤</button>
  </div>
  <p class="input-hint">हरा बटन दबाकर बोलें &nbsp;|&nbsp; Enter दबाकर भेजें</p>
</div>

<button id="sos-btn" onclick="sosAlert()">🆘 आपातकाल</button>

<script>
const MEMORY_KEY   = 'saathiai_history';
const REMINDER_KEY = 'saathiai_reminders';
const chatBox  = document.getElementById('chat-box');
const input    = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const voiceBtn = document.getElementById('voice-btn');

// ── MEMORY ──
function saveHistory(h) {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(h.slice(-30)));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(MEMORY_KEY)) || []; }
  catch { return []; }
}

// ── REMINDERS ──
function saveReminders(r) {
  localStorage.setItem(REMINDER_KEY, JSON.stringify(r));
}
function loadReminders() {
  try { return JSON.parse(localStorage.getItem(REMINDER_KEY)) || []; }
  catch { return []; }
}

function parseAndSetReminder(reply) {
  const match = reply.match(/\[REMINDER:(\d{1,2}):(\d{2}):([^\]]+)\]/);
  if (!match) return null;
  const hours   = parseInt(match[1]);
  const minutes = parseInt(match[2]);
  const message = match[3];
  const now = new Date();
  const reminderTime = new Date();
  reminderTime.setHours(hours, minutes, 0, 0);
  if (reminderTime <= now) reminderTime.setDate(reminderTime.getDate() + 1);
  const reminders = loadReminders();
  reminders.push({ message, time: reminderTime.getTime(), fired: false });
  saveReminders(reminders);
  const timeStr = reminderTime.toLocaleTimeString('hi-IN', { hour: '2-digit', minute: '2-digit' });
  return { message, timeStr };
}

function cleanReply(reply) {
  return reply.replace(/\[REMINDER:[^\]]+\]/g, '').trim();
}

function fireReminder(message) {
  addMessage('assistant', `⏰ ${message}\n\nKya aapne kar liya? 🙏`);
  speakText(message);
  if (Notification.permission === 'granted') {
    new Notification('साथी AI ⏰', { body: message });
  }
}

function checkReminders() {
  const reminders = loadReminders();
  const now = Date.now();
  const remaining = [];
  reminders.forEach(r => {
    if (!r.fired && r.time <= now) {
      fireReminder(r.message);
    } else if (!r.fired) {
      remaining.push(r);
    }
  });
  saveReminders(remaining);
}
setInterval(checkReminders, 30000);
checkReminders();

// ── SPEECH ──
function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 0.85;
  utt.pitch = 1.0;
  utt.lang  = /[\u0900-\u097F]/.test(text) ? 'hi-IN' : 'en-IN';
  speechSynthesis.speak(utt);
}

// ── CHAT UI ──
let history = loadHistory();

function addMessage(role, text, badge) {
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;
  const label = document.createElement('div');
  label.className = 'bubble-label';
  label.textContent = role === 'user' ? 'आप' : 'साथी AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br/>');
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  if (badge) {
    const b = document.createElement('div');
    b.className = 'reminder-badge';
    b.textContent = `⏰ Reminder set: ${badge.timeStr} — ${badge.message}`;
    wrap.appendChild(b);
  }
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
}

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap assistant';
  wrap.id = 'typing-wrap';
  const label = document.createElement('div');
  label.className = 'bubble-label';
  label.textContent = 'साथी AI';

  wr
