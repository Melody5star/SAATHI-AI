<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#b5451b" />
  <title>साथी AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --saffron: #b5451b;
      --saffron-md: #e05a22;
      --green: #1e6b3c;
      --green-lt: #d5f5e3;
      --gold: #d4a017;
      --gray-bg: #fdf6f0;
      --gray-line: #e8d5c4;
      --text: #2c1810;
      --text-soft: #7d5a4f;
      --white: #ffffff;
      --red: #c0392b;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hind', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: var(--saffron);
      color: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-circle {
      width: 54px; height: 54px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
      border: 2px solid var(--gold);
    }
    .header-text h1 { font-size: 26px; font-weight: 600; }
    .header-text p { font-size: 14px; opacity: 0.88; margin-top: 2px; }
    #clock {
      font-size: 15px; font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 6px 12px; border-radius: 20px;
      letter-spacing: 0.05em;
    }
    #chat-box {
      flex: 1; overflow-y: auto;
      padding: 22px 18px;
      display: flex; flex-direction: column;
      gap: 18px; scroll-behavior: smooth;
    }
    .bubble-wrap {
      display: flex; flex-direction: column;
      max-width: 84%;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .bubble-wrap.user      { align-self: flex-end;   align-items: flex-end; }
    .bubble-wrap.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 16px 20px;
      border-radius: var(--radius);
      font-size: 20px; line-height: 1.75;
    }
    .bubble-wrap.user .bubble {
      background: var(--saffron); color: var(--white);
      border-bottom-right-radius: 4px;
    }
    .bubble-wrap.assistant .bubble {
      background: var(--white); color: var(--text);
      border: 1.5px solid var(--gray-line);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .bubble-label {
      font-size: 13px; color: var(--text-soft);
      margin-bottom: 5px; padding: 0 4px; font-weight: 600;
    }
    .typing-bubble {
      background: var(--white);
      border: 1.5px solid var(--gray-line);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 18px 22px;
      display: flex; gap: 7px; align-items: center;
      box-shadow: var(--shadow);
    }
    .dot {
      width: 10px; height: 10px;
      background: var(--saffron-md);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-8px); }
    }
    .quick-replies {
      display: flex; flex-wrap: wrap;
      gap: 10px; padding: 0 18px 10px; flex-shrink: 0;
    }
    .quick-btn {
      padding: 10px 16px; border-radius: 24px;
      border: 2px solid var(--saffron-md);
      background: var(--white); color: var(--saffron);
      font-size: 16px; font-family: 'Hind', sans-serif;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .quick-btn:hover { background: var(--saffron); color: var(--white); }
    #input-area {
      background: var(--white);
      border-top: 2px solid var(--gray-line);
      padding: 14px 18px; flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #user-input {
      flex: 1; padding: 14px 16px;
      border-radius: var(--radius);
      border: 2px solid var(--gray-line);
      background: var(--gray-bg); color: var(--text);
      font-size: 20px; font-family: 'Hind', sans-serif;
      line-height: 1.5; resize: none;
      min-height: 56px; max-height: 140px;
      outline: none; transition: border 0.15s;
    }
    #user-input:focus { border-color: var(--saffron-md); background: var(--white); }
    #user-input::placeholder { color: var(--text-soft); }
    .icon-btn {
      width: 56px; height: 56px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0; transition: all 0.15s;
    }
    #send-btn { background: var(--saffron); color: var(--white); box-shadow: var(--shadow); }
    #send-btn:hover { background: var(--saffron-md); transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #voice-btn { background: var(--green-lt); color: var(--green); border: 2px solid var(--green); }
    #voice-btn:hover { background: var(--green); color: var(--white); }
    #voice-btn.recording {
      background: var(--red); color: var(--white);
      border-color: var(--red); animation: recPulse 1s infinite;
    }
    @keyframes recPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
      50%      { box-shadow: 0 0 0 10px rgba(192,57,43,0); }
    }
    .input-hint { font-size: 13px; color: var(--text-soft); margin-top: 8px; text-align: center; }
    #sos-btn {
      position: fixed; bottom: 110px; right: 18px;
      background: var(--red); color: var(--white);
      border: none; border-radius: 50px;
      padding: 12px 18px; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 16px rgba(192,57,43,0.35);
      font-family: 'Hind', sans-serif; z-index: 100; transition: all 0.15s;
    }
    #sos-btn:hover { transform: scale(1.05); }
    .reminder-badge {
      background: var(--gold); color: #6b3e00;
      border-radius: 8px; padding: 5px 12px;
      font-size: 13px; font-weight: 600;
      margin-top: 6px; display: inline-block;
    }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--gray-line); border-radius: 3px; }
    @media (max-width: 480px) {
      .bubble { font-size: 18px; }
      #user-input { font-size: 18px; }
      header { padding: 12px 14px; }
      .header-text h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-circle">🙏</div>
    <div class="header-text">
      <h1>साथी AI</h1>
      <p id="header-sub">आपका अपना डिजिटल सहायक</p>
    </div>
  </div>
  <div id="clock">--:--</div>
</header>

<div id="chat-box"></div>

<div class="quick-replies" id="quick-replies">
  <button class="quick-btn" onclick="sq('आज का दिन कैसा है?')">🌅 Good Morning</button>
  <button class="quick-btn" onclick="sq('आज की ताज़ा खबर क्या है?')">📰 खबर</button>
  <button class="quick-btn" onclick="sq('आज कौन सी तारीख है?')">📅 तारीख</button>
  <button class="quick-btn" onclick="sq('एक स्वास्थ्य टिप दीजिए')">💊 स्वास्थ्य</button>
</div>

<div id="input-area">
  <div class="input-row">
    <button id="voice-btn" class="icon-btn" onclick="toggleVoice()" title="बोलकर पूछें">🎤</button>
    <textarea id="user-input"
      placeholder="कुछ भी पूछें... (Hindi या English में)"
      rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" class="icon-btn" onclick="sendMessage()" title="भेजें">➤</button>
  </div>
  <p class="input-hint">🎤 हरा बटन दबाकर बोलें &nbsp;|&nbsp; Enter दबाकर भेजें</p>
</div>

<button id="sos-btn" onclick="sosAlert()">🆘 आपातकाल</button>

<script>
var chatLog  = [];
var userName = localStorage.getItem('saathi_name') || '';
var reminders = [];
var recog    = null;
var isRec    = false;
var chatBox  = document.getElementById('chat-box');
var inputEl  = document.getElementById('user-input');
var sendBtn  = document.getElementById('send-btn');
var voiceBtn = document.getElementById('voice-btn');

// ── CLOCK ──
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  document.getElementById('clock').textContent =
    (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}
updateClock();
setInterval(updateClock, 10000);

// ── TIME HELPERS ──
function getGreeting() {
  var h = new Date().getHours();
  if (h >= 5  && h < 12) return 'Good Morning 🌅';
  if (h >= 12 && h < 17) return 'Good Afternoon ☀️';
  if (h >= 17 && h < 21) return 'Good Evening 🌇';
  return 'Good Night 🌙';
}
function getFullTime() {
  return new Date().toLocaleString('hi-IN', {
    weekday: 'long', year: 'numeric',
    month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true
  });
}
function get24Time() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

// ── REMINDER ENGINE ──
function parseReminder(reply) {
  var match = reply.match(/\[REMINDER:(\d{1,2}):(\d{2}):([^\]]+)\]/);
  if (!match) return null;
  var rh  = parseInt(match[1]);
  var rm  = parseInt(match[2]);
  var msg = match[3];
  var now = new Date();
  var rt  = new Date();
  rt.setHours(rh, rm, 0, 0);
  if (rt <= now) rt.setDate(rt.getDate() + 1);
  var newRem = { msg: msg, time: rt.getTime(), fired: false, id: Date.now() };
  reminders.push(newRem);
  localStorage.setItem('saathi_reminders', JSON.stringify(reminders));
  var ts = (rh < 10 ? '0' : '') + rh + ':' + (rm < 10 ? '0' : '') + rm;
  return { msg: msg, timeStr: ts };
}

function checkReminders() {
  var now  = Date.now();
  var keep = [];
  for (var i = 0; i < reminders.length; i++) {
    var r = reminders[i];
    if (r.time <= now && !r.fired) {
      r.fired = true;
      fireReminder(r.msg);
    } else if (!r.fired) {
      keep.push(r);
    }
  }
  reminders = keep;
  localStorage.setItem('saathi_reminders', JSON.stringify(reminders));
}
setInterval(checkReminders, 60000);

function fireReminder(msg) {
  var text = '⏰ याद दिलाना था: ' + msg;
  addBubble('assistant', text, null);
  speak(text);
  if (window.Notification && Notification.permission === 'granted') {
    new Notification('साथी AI ⏰', { body: msg });
  }
}

function cleanReply(r) {
  return r.replace(/\[REMINDER:[^\]]+\]/g, '').trim();
}

// ── SPEECH ──
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u   = new SpeechSynthesisUtterance(text);
  u.rate  = 0.88;
  u.pitch = 1.05;
  u.lang  = /[\u0900-\u097F]/.test(text) ? 'hi-IN' : 'en-IN';
  window.speechSynthesis.speak(u);
}

// ── CHAT UI ──
function addBubble(role, text, badge) {
  var wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  var lbl = document.createElement('div');
  lbl.className = 'bubble-label';
  lbl.textContent = role === 'user' ? (userName ? userName : 'आप') : 'साथी AI';
  var bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = text.replace(/\n/g, '<br/>');
  wrap.appendChild(lbl);
  wrap.appendChild(bub);
  if (badge) {
    var b = document.createElement('div');
    b.className = 'reminder-badge';
    b.textContent = '⏰ Reminder set: ' + badge.timeStr + ' — ' + badge.msg;
    wrap.appendChild(b);
  }
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addTyping() {
  var wrap = document.createElement('div');
  wrap.className = 'bubble-wrap assistant';
  wrap.id = 'tw';
  var lbl = document.createElement('div');
  lbl.className = 'bubble-label';
  lbl.textContent = 'साथी AI';
  var t = document.createElement('div');
  t.className = 'typing-bubble';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(lbl);
  wrap.appendChild(t);
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
  return wrap;
}

// ── NAME CAPTURE ──
function checkForName(text) {
  if (userName) return;
  var patterns = [
    /(?:mera naam|my name is|main hoon|I am|mai hoon|naam hai)\s+([A-Za-z\u0900-\u097F]+)/i,
    /^([A-Za-z\u0900-\u097F]{2,15})$/
  ];
  for (var i = 0; i < patterns.length; i++) {
    var m = text.match(patterns[i]);
    if (m && m[1]) {
      userName = m[1].trim();
      localStorage.setItem('saathi_name', userName);
      document.getElementById('header-sub').textContent = 'नमस्ते, ' + userName + ' जी! 🙏';
      break;
    }
  }
}

// ── SEND MESSAGE ──
function sendMessage(override) {
  var text = (override || inputEl.value).trim();
  if (!text) return;

  if (window.Notification && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  document.getElementById('quick-replies').style.display = 'none';
  checkForName(text);
  addBubble('user', text, null);
  chatLog.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  var tw = addTyping();

  var systemPrompt =
    'You are SaathiAI — a smart friendly assistant like Alexa or Google Assistant for elderly Indians.\n\n' +
    'CURRENT DATE AND TIME: ' + getFullTime() + '\n' +
    'CURRENT 24H TIME: ' + get24Time() + '\n' +
    'USER NAME: ' + (userName || 'unknown') + '\n\n' +
    'PERSONALITY:\n' +
    '- Warm, friendly, patient — like a trusted family member\n' +
    '- Match user language — Hindi, English or Hinglish\n' +
    '- Keep replies short — 2 to 3 lines only\n\n' +
    'YOU CAN HELP WITH:\n' +
    '- General knowledge, GK questions\n' +
    '- Current date, time, day of week\n' +
    '- India and world news summaries\n' +
    '- Health and wellness tips\n' +
    '- Government schemes — PM Vaya Vandana, Ayushman Bharat etc\n' +
    '- Friendly conversation\n' +
    '- Emergency — always say call 112\n\n' +
    'REMINDER RULES — VERY STRICT:\n' +
    'ONLY add [REMINDER:HH:MM:message] tag when user CLEARLY asks:\n' +
    '"remind me", "yaad dilao", "reminder", "alarm", "baad mein batao"\n\n' +
    'For ALL other questions — news, health, GK, date, time, chat:\n' +
    'Just answer normally. NEVER add [REMINDER] tag!\n\n' +
    'When reminder IS asked — calculate exact time from current 24H time above:\n' +
    'Format: [REMINDER:HH:MM:short message here]\n' +
    'Example: Current time 14:30, user says "5 min baad yaad dilao"\n' +
    '→ Reply: "Bilkul! [REMINDER:14:35:Yaad karo!]"\n\n' +
    'RULE: No reminder asked = NO [REMINDER] tag. Zero exceptions.';

  var messages = [{ role: 'system', content: systemPrompt }];
  for (var i = 0; i < chatLog.length; i++) {
    messages.push(chatLog[i]);
  }

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: messages })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    tw.remove();
    if (data.error) {
      addBubble('assistant', '⚠️ ' + data.error, null);
      sendBtn.disabled = false;
      return;
    }
    var raw   = data.reply;
    var badge = parseReminder(raw);
    var clean = cleanReply(raw);
    addBubble('assistant', clean, badge);
    chatLog.push({ role: 'assistant', content: clean });
    if (chatLog.length > 40) chatLog = chatLog.slice(-40);
    speak(clean);
    sendBtn.disabled = false;
  })
  .catch(function() {
    tw.remove();
    addBubble('assistant', '⚠️ कुछ गलत हो गया। फिर कोशिश करें।', null);
    sendBtn.disabled = false;
  });
}

// ── GREETING ──
function greetUser() {
  var g    = getGreeting();
  var name = userName ? userName + ' जी!' : '';
  var msg  = g + (name ? ' ' + name : '') + ' मैं साथी AI हूँ — आपका अपना डिजिटल सहायक।';
  msg += !userName ? ' आपका नाम क्या है?' : ' आज मैं आपकी कैसे मदद कर सकता हूँ?';
  addBubble('assistant', msg, null);
}

function sq(t) { sendMessage(t); }
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── VOICE ──
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Google Chrome use karein'); return;
  }
  if (isRec) { recog.stop(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR();
  recog.lang = 'hi-IN';
  recog.continuous = false;
  recog.interimResults = false;
  recog.onstart = function() {
    isRec = true;
    voiceBtn.classList.add('recording');
    voiceBtn.textContent = '⏹';
  };
  recog.onresult = function(e) {
    inputEl.value = e.results[0][0].transcript;
    autoResize(inputEl);
  };
  recog.onend = function() {
    isRec = false;
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
    if (inputEl.value.trim()) sendMessage();
  };
  recog.onerror = function() {
    isRec = false;
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
  };
  recog.start();
}

function sosAlert() {
  if (confirm('क्या आपको आपातकालीन मदद चाहिए?\nOK दबाएँ।')) {
    sendMessage('मुझे अभी आपातकालीन मदद चाहिए');
  }
}

// ── INIT ──
var savedRem = localStorage.getItem('saathi_reminders');
if (savedRem) {
  try {
    var loaded  = JSON.parse(savedRem);
    var nowInit = Date.now();
    reminders   = loaded.filter(function(r) {
      return !r.fired && r.time > nowInit;
    });
    localStorage.setItem('saathi_reminders', JSON.stringify(reminders));
  } catch(e) { reminders = []; }
}
if (userName) {
  document.getElementById('header-sub').textContent = 'नमस्ते, ' + userName + ' जी! 🙏';
}
greetUser();
if (window.speechSynthesis) window.speechSynthesis.getVoices();
</script>
</body>
</html>
